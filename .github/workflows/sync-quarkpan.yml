name: 同步仓库和Releases

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  同步代码:
    runs-on: ubuntu-latest
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 配置Git用户
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/ihmily/QuarkPanTool.git
      - name: 获取上游所有分支和标签
        run: |
          git fetch upstream --tags --force
      - name: 强制推送所有分支和标签
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --force --all "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force --tags "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

  同步Releases:
    runs-on: ubuntu-latest
    needs: 同步代码
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
      - name: 获取并排序源仓库的所有Releases
        id: get_releases
        run: |
          SOURCE_REPO="ihmily/QuarkPanTool"
          PAGE=1
          PER_PAGE=100
          RELEASES_JSON=""
          while true; do
            API_URL="https://api.github.com/repos/${SOURCE_REPO}/releases?per_page=${PER_PAGE}&page=${PAGE}"
            RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" "$API_URL")
            if ! echo "$RESPONSE" | jq -e 'type == "array"' > /dev/null; then
              echo "错误：API 响应不是数组"
              exit 1
            fi
            if [ "$(echo "$RESPONSE" | jq length)" -eq 0 ]; then
              break
            fi
            RELEASES_JSON=$(echo "$RELEASES_JSON" "$RESPONSE" | jq -s 'add')
            PAGE=$((PAGE + 1))
          done
          RELEASES_JSON=$(echo "$RELEASES_JSON" | jq 'sort_by(.published_at)')
          echo "$RELEASES_JSON" > releases.json
      - name: 按顺序处理每个Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_REPO="ihmily/QuarkPanTool"
          TARGET_REPO="${{ github.repository }}"
          jq -r '.[] | @base64' releases.json | while read release_b64; do
            release=$(echo "$release_b64" | base64 --decode)
            TAG_NAME=$(echo "$release" | jq -r '.tag_name')
            BODY=$(echo "$release" | jq -r '.body // ""')
            echo "正在处理 Release: $TAG_NAME"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$TARGET_REPO/releases/tags/$TAG_NAME")
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Release $TAG_NAME 已存在，跳过"
              continue
            elif [ "$HTTP_STATUS" -eq 404 ]; then
              echo "Release $TAG_NAME 不存在，开始创建"
            else
              echo "警告：检查 Release 时返回意外状态码 $HTTP_STATUS，尝试创建"
            fi
            echo "$BODY" > body.txt
            if ! gh release create "$TAG_NAME" --repo "$TARGET_REPO" --title "$TAG_NAME" --notes-file body.txt; then
              echo "创建 Release $TAG_NAME 失败"
              exit 1
            fi
            ASSET_URLS=$(echo "$release" | jq -r '.assets[]?.browser_download_url')
            if [ -n "$ASSET_URLS" ]; then
              mkdir -p "assets_$TAG_NAME"
              cd "assets_$TAG_NAME"
              echo "$ASSET_URLS" | while read url; do
                if [ -n "$url" ]; then
                  curl -s -fL -O "$url"
                fi
              done
              for file in *; do
                if [ -f "$file" ]; then
                  gh release upload "$TAG_NAME" "$file" --repo "$TARGET_REPO" --clobber
                fi
              done
              cd ..
              rm -rf "assets_$TAG_NAME"
            fi
            rm -f body.txt
          done
