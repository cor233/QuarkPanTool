name: 同步仓库和Releases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: 设置Git用户信息
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/ihmily/QuarkPanTool.git
          git fetch upstream

      - name: 同步默认分支
        run: |
          git checkout main 2>/dev/null || git checkout master
          git merge upstream/main --allow-unrelated-histories -m "同步上游仓库 main 分支"
          git push origin HEAD

      - name: 同步所有标签
        run: |
          git push origin --tags

      - name: 同步Releases
        run: |
          pip install ghrelease
          ghrelease sync ihmily/QuarkPanTool cor233/QuarkPanTool --token ${{ secrets.SYNC_TOKEN }}
